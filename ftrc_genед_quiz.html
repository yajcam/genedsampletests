/* ─── SOUND EFFECTS (Web Audio API – no external files needed) ─── */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}

function playCorrect() {
  const c = getCtx();
  const o = c.createOscillator();
  const g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(523, c.currentTime);
  o.frequency.setValueAtTime(659, c.currentTime + 0.12);
  o.frequency.setValueAtTime(784, c.currentTime + 0.24);
  g.gain.setValueAtTime(0.25, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
  o.start(c.currentTime);
  o.stop(c.currentTime + 0.6);
}

function playWrong() {
  const c = getCtx();
  const o = c.createOscillator();
  const g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, c.currentTime);
  o.frequency.setValueAtTime(200, c.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.4);
  o.start(c.currentTime);
  o.stop(c.currentTime + 0.4);
}

/* ─── SCORE STATE ─── */
let correct = 0, wrong = 0;

function updateScore(isCorrect) {
  if (isCorrect) correct++; else wrong++;
  const total = correct + wrong;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent   = wrong;
  document.getElementById('s-pct').textContent     = Math.round(correct / total * 100) + '%';
}

/* ─── RENDER QUIZ ─── */
const container = document.getElementById('quiz-container');
const letters = ['A','B','C','D','E'];

questions.forEach((q, qi) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q' + qi;

  let optsHTML = '';
  q.opts.forEach((opt, oi) => {
    optsHTML += `
      <li class="option" id="opt-${qi}-${oi}" ondblclick="answer(${qi},${oi})">
        <span class="letter">${letters[oi]}.</span>
        <span>${opt}</span>
      </li>`;
  });

  card.innerHTML = `
    <div class="question-num">Question ${qi + 1} of ${questions.length}</div>
    <div class="question-text">${q.q}</div>
    <ul class="options">${optsHTML}</ul>
    <p class="hint">Double-click an option to answer</p>
    <div class="rationale" id="rat-${qi}"></div>
  `;

  container.appendChild(card);
});

/* ─── ANSWER HANDLER ─── */
const answered = new Set();

function answer(qi, oi) {
  if (answered.has(qi)) return;
  answered.add(qi);

  const q = questions[qi];
  const card = document.getElementById('q' + qi);
  const ratDiv = document.getElementById('rat-' + qi);
  const isCorrect = oi === q.ans;

  // Lock all options
  q.opts.forEach((_, idx) => {
    const el = document.getElementById(`opt-${qi}-${idx}`);
    el.classList.add('locked');
    if (idx === q.ans) el.classList.add('correct');
    else if (idx === oi && !isCorrect) el.classList.add('wrong');
  });

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Rationale
  ratDiv.innerHTML = `<strong>${isCorrect ? '✔ Correct!' : '✘ Incorrect. Correct answer: ' + letters[q.ans] + '. ' + q.opts[q.ans]}</strong><br><br>${q.rationale}`;
  ratDiv.classList.add('show');

  // Sound
  if (isCorrect) playCorrect(); else playWrong();

  // Score
  updateScore(isCorrect);

  // Scroll hint away
  const hint = card.querySelector('.hint');
  if (hint) hint.style.display = 'none';
}
</script>
